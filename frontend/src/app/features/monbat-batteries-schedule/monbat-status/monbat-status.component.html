@if (schedule) {
  @if (positionInTime(schedule); as positionInTime) {
    <span class="{{ schedule.status }} {{ positionInTime }}">
      @if (schedule.status === "enabled" && positionInTime === "present") {
        <ng-container i18n="@@scheduleCurrent">current</ng-container>
      } @else {
        {{ powerLimitScheduleStatusLabels[schedule.status] }}
      }
    </span>
  }
}
