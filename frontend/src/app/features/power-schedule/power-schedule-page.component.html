@let plant = plant$ | async;

@if (plant && !plant.plantSpecificMetadata?.bessId) {
  <nz-result
    nzStatus="warning"
    i18n-nzTitle
    [nzTitle]="'This page is intended for plants with a BESS.'"
    i18n-nzSubTitle
    [nzSubTitle]="
      'Click the button below to access the power limit schedule page for plants without a BESS.'
    "
  >
    <div nz-result-extra>
      <button nz-button nzType="primary" routerLink="../power-limit-schedule">
        Go to power limit schedule
      </button>
    </div>
  </nz-result>
}

@if (plant && plant.plantSpecificMetadata?.bessId) {
  <div class="page-content" [class.single-pane-mode]="singlePaneMode">
    <div class="left-pane" [class.collapsed]="showDetail">
      <h2 i18n>Power schedule</h2>

      <div class="current-schedule-block">
        <ul class="custom-list">
          <li
            class="list-item active-schedule-nav"
            routerLink="priority-modes"
            routerLinkActive="is-active"
          >
            <div class="left icon-slot">
              <span nz-icon nzType="info-circle" nzTheme="outline"></span>
            </div>

            <div i18n class="left">Priority Modes</div>
            <div class="right">
              <span nz-icon nzType="right" nzTheme="outline"></span>
            </div>
          </li>

          @if (hasPermissionToAdjust) {
            <li
              class="list-item active-schedule-nav"
              routerLink="manual-adjust"
              routerLinkActive="is-active"
            >
              <div class="left icon-slot">
                <span nz-icon nzType="edit" nzTheme="outline"></span>
              </div>

              <div i18n class="left">Manual adjustment</div>
              <div class="right">
                <span nz-icon nzType="right" nzTheme="outline"></span>
              </div>
            </li>
          }

          <!-- <li class="list-item active-schedule-nav" routerLink="history" routerLinkActive="is-active">
          <div class="left icon-slot">
            <span nz-icon nzType="history" nzTheme="outline"></span>
          </div>

          <div class="left">History</div>
          <div class="right">
            <span nz-icon nzType="right" nzTheme="outline"></span>
          </div>
        </li> -->
        </ul>
      </div>

      <h3 i18n>Schedules list</h3>
      @if (hasPermissionToUpload) {
        <div class="upload-block">
          <app-power-schedule-file-upload
            [plantId]="(plant$ | async)?.id"
            (fileUpload)="onFileUploadSuccess($event)"
          ></app-power-schedule-file-upload>
        </div>
      }

      <div class="list-block">
        <app-power-schedule-history-list-loader></app-power-schedule-history-list-loader>
      </div>
    </div>

    <div class="right-pane" [class.collapsed]="!showDetail">
      <router-outlet (activate)="onChildRouteActivate()" (deactivate)="onChildRouteDeactivate()">
      </router-outlet>
    </div>
  </div>
}
