<div class="flex-row">
  <app-device-current-errors-widget></app-device-current-errors-widget>

  <app-monbat-flow-chart-widget
    [data]="(currentDataRequest$ | async)?.data || null"
    [loading]="(currentDataRequest$ | async)?.isLoading"
    [error]="(currentDataRequest$ | async)?.error"
    [hasPv]="(hasPV$ | async) || false"
  ></app-monbat-flow-chart-widget>
</div>

<nz-card class="custom-card" nzBordered="true" nzSize="small">
  <div class="card-header">
    @if (newDayTrigger$ | async) {
      <div class="card-title">
        <app-datetime-range-select
          (modelChange)="onDatetimeRangeChange($event)"
          [customRangeTypeOptions]="['day']"
          [size]="'large'"
          [timeZone]="(timeZone$ | async) || undefined"
          [defaultOption]="'day'"
        ></app-datetime-range-select>
      </div>
    }
  </div>
  <!-- inside your nz-card body -->
  <div class="chart-host">
    <app-energy-trend-chart
      [data]="(energyTrendRequest$ | async)?.data"
      [loading]="!!(energyTrendIsLoading$ | async)"
      [context]="chartContext$ | async"
      #chartComponent
    >
    </app-energy-trend-chart>

    <!-- Overlayed where the default Highcharts context button sits -->
    <app-highcharts-export-option
      class="chart-export-btn"
      [chartComponent]="chartComponent"
      [disabled]="!!(energyTrendIsLoading$ | async)"
      [filename]="(energyTrendRequest$ | async)?.data?.exportFileName"
      [size]="'large'"
      [limitedOptions]="true"
    >
    </app-highcharts-export-option>
  </div>

  <!-- <app-energy-trend-chart
