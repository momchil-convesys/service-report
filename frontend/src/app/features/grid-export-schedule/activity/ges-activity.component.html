<nz-timeline nzMode="custom">
  <nz-timeline-item [nzLabel]="labelTemplate1" [nzPosition]="'left'" [nzColor]="'gray'">
    <span>File uploaded</span>
    <div class="user-details">
      Automatically uploaded
      <!-- by <app-user-link [userId]="schedule.file.uploadedByUserId"></app-user-link> -->
    </div>

    <ng-template #labelTemplate1>
      <app-relative-timestamp
        [timestamp]="schedule.scheduleUploaded.timestamp"
        [plain]="false"
      ></app-relative-timestamp>
    </ng-template>
  </nz-timeline-item>

  @for (item of schedule.statusHistory; track item) {
    @if (item.statusChangedTo !== "draft") {
      <nz-timeline-item
        [nzLabel]="labelTemplate2"
        [nzPosition]="'left'"
        [nzColor]="getColorForStatus(item.statusChangedTo)"
      >
        Status changed to
        <span class="status-tag" [style.color]="getColorForStatus(item.statusChangedTo)">
          {{ item.statusChangedTo }}
        </span>
        <div class="user-details">by <app-user-link [userId]="item.by.id"></app-user-link></div>

        <ng-template #labelTemplate2>
          <app-relative-timestamp
            [timestamp]="item.timestamp"
            [plain]="false"
          ></app-relative-timestamp>
        </ng-template>
      </nz-timeline-item>
    }
  }
</nz-timeline>
