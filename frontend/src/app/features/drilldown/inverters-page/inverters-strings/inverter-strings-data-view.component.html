<table class="pv-data-view">
  <thead>
    <tr>
      <th i18n class="pv-data-cell name">String</th>
      <th i18n class="pv-data-cell voltage">Voltage</th>
      <th i18n="@@electric-current" class="pv-data-cell el-current">Current</th>
    </tr>
  </thead>
  <tbody>
    @for (string of stringsMetadata; track string.stringId) {
      <tr class="pv-data-row">
        <td class="pv-data-cell name">PV{{ string.displayIndex }}</td>

        @let stringData = getDataForStringById(string.stringId);

        <td class="pv-data-cell voltage">
          @if (stringData.voltage !== undefined) {
            <app-value-display
              [value]="stringData.voltage"
              [unit]="' V'"
              [format]="'1.3-3'"
            ></app-value-display>
          }
        </td>

        <td class="pv-data-cell el-current">
          @if (stringData.electricCurrent !== undefined) {
            <app-value-display
              [value]="stringData.electricCurrent"
              [unit]="' A'"
              [format]="'1.3-3'"
            ></app-value-display>
          }
        </td>
      </tr>
    }
  </tbody>
</table>
