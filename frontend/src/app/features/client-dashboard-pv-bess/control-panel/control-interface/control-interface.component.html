@if (plant$ | async; as plant) {
  @if (targetRange$ | async; as targetRange) {
    <app-power-schedule-manual-adjustment-table
      [plant]="plant"
      [targetRange]="targetRange"
      [dataRequest]="trackingDataRequest$ | async"
      [inWidget]="true"
    ></app-power-schedule-manual-adjustment-table>
  } @else {
    <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 3 }"></nz-skeleton>
  }
} @else {
  <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 3 }"></nz-skeleton>
}
