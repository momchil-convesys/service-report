<div nz-form-item>
  <nz-form-label [nzFor]="'datePickerId'">{{ label }}</nz-form-label>
  <nz-form-control>
    <nz-date-picker
      id="datePickerId"
      [formControl]="formControlDP"
      nzMode="date"
      [nzShowTime]="{ nzFormat: 'HH:mm' }"
      [nzFormat]="format"
      [nzAllowClear]="false"
    ></nz-date-picker>
  </nz-form-control>
</div>
