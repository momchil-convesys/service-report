<form (ngSubmit)="onSubmit()" [formGroup]="form" nz-form nzLayout="vertical">
  @if (schematicElement) {
    <div>
      {{ schematicElement | json }}
    </div>
  }

  @if (!schematicElement) {
    <div>
      <nz-form-item>
        <nz-form-label> Schematic element </nz-form-label>
        <nz-form-control>
          <nz-select nzShowSearch nzAllowClear [formControl]="form.controls.schematicLabel">
            @for (option of availableSchematicElements$ | async; track option.id) {
              <nz-option [nzValue]="option.id" [nzLabel]="option.label"></nz-option>
            }
          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </div>
  }

  <nz-form-item>
    <nz-form-label nzRequired> Material/part name </nz-form-label>
    <nz-form-control>
      <!-- <nz-select
        nzShowSearch
        nzAllowClear
        nzPlaceHolder="Enter material/part name"
        [formControl]="form.controls.name"
        [nzAutoClearSearchValue]="false"
      >
        <nz-option
          *ngFor="let option of availableMaterials$ | async"
          [nzValue]="option.name"
          [nzLabel]="option.name"
        ></nz-option>
      </nz-select> -->

      <input
        placeholder="Enter material/part name"
        nz-input
        [nzAutocomplete]="auto"
        [formControl]="form.controls.name"
        spellcheck="false"
      />
      <nz-autocomplete [nzDataSource]="(availableMaterials$ | async) || []" #auto>
      </nz-autocomplete>
    </nz-form-control>
  </nz-form-item>
</form>
