<div class="schema-container">
  <div class="controls">
    <!-- 
    TODO: 
    nz-button-group is not a known element, so it was replaced with a div.
    Proper styling is needed probably.
     -->
    <div class="nz-button-group">
      <button nz-button nzType="default" (click)="onZoomIn()">
        <span nz-icon nzType="zoom-in" nzTheme="outline"></span> Zoom in
      </button>
      <button nz-button nzType="default" (click)="onZoomOut()">
        <span nz-icon nzType="zoom-out" nzTheme="outline"></span> Zoom out
      </button>
    </div>
    <button nz-button nzType="default" (click)="onAutoFit()">
      <span nz-icon nzType="fullscreen" nzTheme="outline"></span> Auto fit
    </button>
  </div>
  <div class="schema-view-container">
    <app-materials-schema-view></app-materials-schema-view>
  </div>
</div>

<div class="items-list">
  <app-selected-materials-list></app-selected-materials-list>
</div>
