<main class="login-page">
  <section class="login-panel">
    <div class="brand">
      <div class="company-name">Convesys</div>
      <div class="details">Service Reports</div>
    </div>

    <form nz-form class="login-form" (ngSubmit)="onSubmit()">
      <label>
        <span>Username</span>
        <input nz-input name="username" [(ngModel)]="username" autocomplete="username" />
      </label>

      <label>
        <span>Password</span>
        <input
          nz-input
          name="password"
          type="password"
          [(ngModel)]="password"
          autocomplete="current-password"
        />
      </label>

      @if (error) {
        <nz-alert nzType="error" [nzMessage]="error"></nz-alert>
      }

      <button nz-button nzType="primary" [nzLoading]="isLoading" [disabled]="!username || !password">
        Login
      </button>
    </form>
  </section>
</main>
